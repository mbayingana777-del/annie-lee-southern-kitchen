<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu | Annie Lee's Southern Kitchen</title>

<style>
body{
  background:#070707;
  color:#fff;
  font-family:Inter,sans-serif;
  margin:0;
}

.container{
  width:95%;
  max-width:1200px;
  margin:auto;
  padding:20px 0;
}

h1{text-align:center;}

.menu-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.item{
  background:#111;
  border-radius:20px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
  transition:.25s;
}

.item:hover{
  transform:translateY(-6px);
  box-shadow:0 0 25px rgba(217,48,24,.4);
  border-color:#ff5b2e;
}

.item img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.item-content{
  padding:15px;
}

.item button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#d93018;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.cart{
  position:fixed;
  right:20px;
  top:100px;
  width:300px;
  background:#111;
  border-radius:20px;
  padding:15px;
  border:1px solid rgba(255,255,255,.1);
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

.qty{
  display:flex;
  gap:5px;
}

.qty button{
  background:#222;
  color:#fff;
  border:none;
  padding:5px 10px;
  cursor:pointer;
}

.checkout{
  background:#ff5b2e;
  margin-top:10px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.upsell{
  background:#1a1a1a;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  font-size:0.9rem;
  border:1px solid rgba(255,255,255,.08);
}
</style>
</head>

<body>

<div class="container">
<h1>Full Menu</h1>
<div class="menu-grid" id="menu"></div>
</div>

<div class="cart">
<h2>Your Order</h2>
<div id="cart-items"></div>
<p>Total: $<span id="total">0</span></p>

<div id="upsell-box"></div>

<button class="checkout" onclick="checkout()">Checkout</button>
</div>

<script>

const menu = [
{name:"Fish Dinner", price:16, img:"fish-dinner.jpg"},
{name:"6 Wings", price:12, img:"6-wings.jpg"},
{name:"12 Wings", price:18, img:"12-wings.jpg"},
{name:"6 Wings + 2 Sides", price:18, img:"6-wings-2-sides.jpg"},
{name:"12 Wings + 2 Sides", price:22, img:"12-wings-2-sides.jpg"},
{name:"Wings + Rib Dinner", price:25, img:"wings-rib-dinner.jpg"},
{name:"Mac & Cheese", price:4, img:"mac-and-cheese.jpg"},
{name:"Collard Greens", price:4, img:"collard-greens.jpg"},
{name:"Candied Yams", price:4, img:"candied-yams.jpg"},
{name:"Red Beans & Rice", price:5, img:"red-beans-rice.jpg"},
{name:"Large Red Beans & Rice", price:7, img:"lg-red-beans-rice.jpg"},
{name:"Potato Salad", price:4, img:"potato-salad.jpg"},
{name:"Fries", price:3, img:"french-fries.jpg"},
{name:"Cornbread", price:2, img:"cornbread.jpg"},
{name:"Soda", price:2, img:"soda.jpg"}
];

let cart = [];

function renderMenu(){
  const menuDiv = document.getElementById("menu");

  menu.forEach((item,i)=>{
    menuDiv.innerHTML += `
      <div class="item">
        <img src="assets/${item.img}">
        <div class="item-content">
          <h3>${item.name}</h3>
          <p>$${item.price}</p>
          <button onclick="addToCart(${i})">Add to Order</button>
        </div>
      </div>
    `;
  });
}

function addToCart(i){
  const item = menu[i];
  const existing = cart.find(c => c.name === item.name);

  if(existing){
    existing.qty++;
  } else {
    cart.push({...item, qty:1});
  }

  showUpsell(item.name);
  updateCart();
}

function updateCart(){
  const cartDiv = document.getElementById("cart-items");
  const totalEl = document.getElementById("total");

  cartDiv.innerHTML = "";
  let total = 0;

  cart.forEach((item, i)=>{
    total += item.price * item.qty;

    cartDiv.innerHTML += `
      <div class="cart-item">
        <span>${item.name}</span>
        <div class="qty">
          <button onclick="changeQty(${i}, -1)">-</button>
          <span>${item.qty}</span>
          <button onclick="changeQty(${i}, 1)">+</button>
        </div>
      </div>
    `;
  });

  totalEl.innerText = total;
}

function changeQty(i, change){
  cart[i].qty += change;
  if(cart[i].qty <= 0){
    cart.splice(i,1);
  }
  updateCart();
}

function showUpsell(itemName){
  const box = document.getElementById("upsell-box");

  if(itemName.includes("Wings")){
    box.innerHTML = `<div class="upsell">🔥 Add Mac & Cheese?</div>`;
  } else if(itemName.includes("Dinner")){
    box.innerHTML = `<div class="upsell">🥤 Add a Soda?</div>`;
  } else {
    box.innerHTML = "";
  }
}

function checkout(){
  alert("Stripe will be connected here.");
}

renderMenu();

</script>

</body>
</html>
